<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจองคิวฉีดวัคซีน นศ.</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* Neo-Brutalism & Mobile-First Design */
        :root {
            --bg-color: #f4f4f5; --apricot: #FFB347; 
            --text-color: #1a1a1a; --border-color: #1a1a1a; --disabled-bg: #e0e0e0;
        }
        * { box-sizing: border-box; font-family: 'Sarabun', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #ffffff; border: 3px solid var(--border-color); border-radius: 12px; box-shadow: 6px 6px 0px var(--border-color); padding: 24px; margin-bottom: 24px; position: relative; }
        h1 { font-size: 20px; text-align: center; margin-top: 0; margin-bottom: 24px; background: var(--apricot); padding: 12px; border: 3px solid var(--border-color); border-radius: 8px; box-shadow: 4px 4px 0px var(--border-color); line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input[type="text"], input[type="tel"], input[type="datetime-local"], select { width: 100%; padding: 14px; font-size: 16px; border: 3px solid var(--border-color); border-radius: 8px; background: #fff; transition: all 0.2s ease; }
        input:focus { outline: none; background: #fffbf0; box-shadow: 4px 4px 0px var(--border-color); }
        
        .session-card { display: flex; align-items: flex-start; padding: 16px; margin-bottom: 12px; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: all 0.2s; background: #fff; position: relative; }
        .session-card:hover:not(.disabled) { background: #fffbf0; transform: translateY(-2px); box-shadow: 4px 4px 0px var(--border-color); }
        .session-card.disabled { background: var(--disabled-bg); cursor: not-allowed; opacity: 0.7; }
        .session-card input[type="radio"] { appearance: none; width: 24px; height: 24px; border: 3px solid var(--border-color); border-radius: 50%; margin-right: 16px; margin-top: 2px; display: grid; place-content: center; flex-shrink: 0; }
        .session-card input[type="radio"]::before { content: ""; width: 12px; height: 12px; border-radius: 50%; transform: scale(0); transition: 120ms transform ease-in-out; background-color: var(--border-color); }
        .session-card input[type="radio"]:checked::before { transform: scale(1); }
        
        .session-info { flex-grow: 1; }
        .session-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; display: block; color: #d35400; }
        .session-vaccines { font-size: 14px; margin-bottom: 6px; display: block; line-height: 1.4; }
        .session-quota { font-size: 14px; color: #555; font-weight: bold; }
        .badge-status { background: #ff6b6b; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 2px solid var(--border-color); float: right; }

        button { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; color: var(--text-color); background: #a8e6cf; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); transition: all 0.1s ease; }
        button:active:not(:disabled) { box-shadow: 0px 0px 0px var(--border-color); transform: translate(4px, 4px); }
        button:disabled { background: #ccc; cursor: not-allowed; color: #666; }
        
        .btn-export { background: #ff8b94; padding: 10px; font-size: 14px; }
        .btn-admin { background: var(--apricot); }
        .btn-cancel { background: #e0e0e0; margin-top: 10px; }
        .btn-add { background: #ffd3b6; padding: 10px; font-size: 16px; margin-bottom: 15px;}
        .btn-remove { background: #ff6b6b; padding: 8px; width: auto; font-size: 14px; margin-top: 10px; color: white;}
        .btn-small { padding: 8px; font-size: 14px; width: auto; margin-top: 5px; }

        .alert { display: none; background: #d4edda; color: #155724; padding: 14px; border: 3px solid #155724; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; box-shadow: 4px 4px 0px #155724; }
        .alert-closed { background: #f8d7da; color: #721c24; border-color: #721c24; box-shadow: 4px 4px 0px #721c24; }
        .admin-icon { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; background: #fff; border: 2px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0px var(--border-color); z-index: 10; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 600px; padding: 24px; border: 3px solid var(--border-color); border-radius: 12px; box-shadow: 8px 8px 0px var(--border-color); max-height: 90vh; overflow-y: auto; }
        
        .campaign-item { background: #f0f0f0; border: 2px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .campaign-item.active { border-color: #28a745; background: #e8f5e9; box-shadow: 4px 4px 0px #28a745; }
        .admin-session-row { background: #fff; padding: 15px; border: 2px dashed #aaa; border-radius: 8px; margin-top: 15px; }
        .vaccine-checkbox-list { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; background: #fafafa; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .vaccine-checkbox-list label { font-size: 13px; font-weight: normal; margin: 0; display: flex; align-items: center;}
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-icon" onclick="openAdminModal()">⚙️</div>
        
        <h1 id="pageTitle">💉 แบบฟอร์มจองคิวฉีดวัคซีน</h1>
        
        <div class="alert" id="successAlert">✅ บันทึกข้อมูลสำเร็จ!</div>
        <div class="alert alert-closed" id="closedAlert" style="display:none;">⛔️ ขณะนี้ยังไม่มีโครงการที่เปิดรับลงทะเบียน</div>

        <form id="vaccineForm" style="display:none;">
            <div class="form-group">
                <label for="studentId">รหัสนักศึกษา / รหัสพนักงาน</label>
                <input type="text" id="studentId" required placeholder="ระบุรหัส">
            </div>
            <div class="form-group">
                <label for="fullName">ชื่อ - สกุล</label>
                <input type="text" id="fullName" required placeholder="ระบุชื่อ-สกุล">
            </div>
            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์ที่ติดต่อได้</label>
                <input type="tel" id="phone" required placeholder="08X-XXX-XXXX">
            </div>

            <div class="form-group">
                <label>เลือกรอบที่ต้องการฉีดวัคซีน</label>
                <div id="sessionsContainer"></div>
            </div>

            <button type="submit" id="submitBtn">💾 บันทึกการจอง</button>
        </form>
        <p id="loadingText" style="text-align:center; font-weight:bold;">⏳ กำลังโหลดข้อมูล...</p>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-content" id="adminViewMain">
            <h2 style="margin-top:0; border-bottom:3px solid var(--border-color); padding-bottom:10px;">⚙️ จัดการโครงการฉีดวัคซีน</h2>
            
            <button class="btn-admin" onclick="showCreateCampaignView()" style="margin-bottom: 20px;">➕ สร้างโครงการใหม่</button>
            
            <h3>ประวัติโครงการทั้งหมด</h3>
            <div id="campaignHistoryList"></div>

            <button class="btn-cancel" onclick="closeAdminModal()">❌ ปิดหน้าต่าง</button>
        </div>

        <div class="modal-content" id="adminViewEdit" style="display:none;">
            <h2 id="editViewTitle" style="margin-top:0; border-bottom:3px solid var(--border-color); padding-bottom:10px;">สร้างโครงการใหม่</h2>
            
            <input type="hidden" id="editCampId">
            <div class="form-group">
                <label>ชื่อโครงการ (เช่น นศ.ปี 1 เทอม 1/2569)</label>
                <input type="text" id="editCampName" placeholder="ระบุชื่อโครงการ">
            </div>
            <div class="form-group">
                <label>⏳ วันที่และเวลาปิดรับข้อมูล (Deadline)</label>
                <input type="datetime-local" id="editCampDeadline">
                <span style="font-size:12px; color:#555;">*หากเว้นว่างไว้ ฟอร์มจะเปิดรับตลอดเวลา</span>
            </div>

            <h3 style="margin-bottom: 10px; border-top: 2px solid #eee; padding-top:15px;">รายการรอบการฉีดในโครงการนี้</h3>
            <div id="adminSessionsList"></div>
            <button type="button" class="btn-add" onclick="addNewAdminSessionRow()">➕ เพิ่มรอบวัน/เวลาใหม่</button>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-admin" onclick="saveCampaign()">💾 บันทึกโครงการ</button>
                <button class="btn-cancel" style="margin-top:0;" onclick="showMainAdminView()">❌ ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        // 1. นำ Firebase Config ของคุณมาใส่ตรงนี้
        const firebaseConfig = {
            apiKey: "AIzaSyBsEXH7UzyDvOQbq7Q_cv_DufA4cDHktIM",
            authDomain: "vacciner-a3b0f.firebaseapp.com",
            projectId: "vacciner-a3b0f",
            storageBucket: "vacciner-a3b0f.firebasestorage.app",
            messagingSenderId: "322679198332",
            appId: "1:322679198332:web:01e4174c3f30845d576ff9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PIN = "1234";
        const MASTER_VACCINES = [
            "ตรวจหาภูมิคุ้มกันไวรัสตับอักเสบบี", "ตรวจหาภูมิคุ้มกันอีสุกอีใส", "วัคซีน HBV (วัคซีนป้องกันตับอักเสบบี)",
            "วัคซีน VAR (วัคซีนป้องกันสุกใส)", "วัคซีน MMR (วัคซีนป้องกันหัด-หัดเยอรมัน-คางทูม)",
            "วัคซีน TdaP (วัคซีนป้องกัน คอตีบ-บาดทะยัก-ไอกรน)", "วัคซีน (ป้องกันไขหวัดใหญ่ 4 สายพันธุ์)", "เอกซเรย์ปอด-หัวใจ"
        ];
        
        let allCampaigns = [];
        let activeCampaign = null;

        window.onload = async () => { loadActiveForm(); };

        // --- ฝั่งผู้ใช้ (นักศึกษา) ---
        async function loadActiveForm() {
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('vaccineForm').style.display = 'none';
            document.getElementById('closedAlert').style.display = 'none';

            try {
                // ดึงข้อมูลโครงการทั้งหมด
                const configDoc = await db.collection('app_settings').doc('vaccine_campaigns').get();
                if (configDoc.exists) { 
                    allCampaigns = configDoc.data().campaigns || []; 
                }

                // หาโครงการที่ถูกตั้งเป็นสถานะ 'เปิดใช้งาน' (isActive: true)
                activeCampaign = allCampaigns.find(c => c.isActive === true);

                if (!activeCampaign) {
                    showClosedMessage("⛔️ ขณะนี้ยังไม่มีโครงการที่เปิดรับลงทะเบียน");
                    return;
                }

                // เปลี่ยนชื่อหัวเว็ปให้ตรงกับชื่อโครงการ
                document.getElementById('pageTitle').innerText = "💉 " + activeCampaign.name;

                // เช็ค Deadline
                if (activeCampaign.deadline) {
                    const now = new Date();
                    if (now > new Date(activeCampaign.deadline)) {
                        showClosedMessage("⛔️ โครงการนี้ปิดรับการลงข้อมูลแล้ว"); return;
                    }
                }

                // นับยอดโควตาจากฐานข้อมูล
                const snapshot = await db.collection('vaccine_responses')
                                         .where('campaignId', '==', activeCampaign.id).get();
                let bookedCounts = {};
                snapshot.forEach(doc => {
                    const sid = doc.data().sessionId;
                    bookedCounts[sid] = (bookedCounts[sid] || 0) + 1;
                });

                renderSessions(activeCampaign.sessions, bookedCounts);

            } catch (error) {
                console.error("Error loading:", error);
                document.getElementById('loadingText').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }

        function showClosedMessage(msg) {
            document.getElementById('loadingText').style.display = 'none';
            const alert = document.getElementById('closedAlert');
            alert.innerText = msg; alert.style.display = 'block';
        }

        function renderSessions(sessions, bookedCounts) {
            const container = document.getElementById('sessionsContainer');
            container.innerHTML = '';
            
            if (!sessions || sessions.length === 0) {
                container.innerHTML = '<p style="color:red;">ไม่มีรอบการฉีดให้เลือก</p>';
                document.getElementById('submitBtn').disabled = true; return;
            }

            document.getElementById('submitBtn').disabled = false;
            sessions.forEach(session => {
                const booked = bookedCounts[session.id] || 0;
                const isFull = booked >= parseInt(session.quota);
                const label = document.createElement('label');
                label.className = `session-card ${isFull ? 'disabled' : ''}`;
                
                let inputHtml = `<input type="radio" name="selectedSession" value="${session.id}" required ${isFull ? 'disabled' : ''}>`;
                let vaccinesHtml = session.vaccines.map(v => `• ${v}`).join('<br>');
                let infoHtml = `
                    <div class="session-info">
                        <span class="session-title">📅 ${session.datetime}</span>
                        <span class="session-vaccines"><strong>💉 วัคซีนในรอบนี้:</strong><br>${vaccinesHtml || '- ไม่ระบุ -'}</span>
                        <span class="session-quota">👥 จองแล้ว ${booked} / ${session.quota} คน</span>
                    </div>
                `;
                let badgeHtml = isFull ? `<div class="badge-status">เต็มแล้ว</div>` : '';

                label.innerHTML = inputHtml + infoHtml + badgeHtml;
                container.appendChild(label);
            });

            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('vaccineForm').style.display = 'block';
        }

        document.getElementById('vaccineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectedRadio = document.querySelector('input[name="selectedSession"]:checked');
            if (!selectedRadio) { alert('กรุณาเลือกรอบที่ต้องการจอง'); return; }
            
            const sessionObj = activeCampaign.sessions.find(s => s.id === selectedRadio.value);
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "⏳ กำลังบันทึก..."; submitBtn.disabled = true;

            const data = {
                campaignId: activeCampaign.id,
                campaignName: activeCampaign.name,
                studentId: document.getElementById('studentId').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                sessionId: sessionObj.id,
                sessionDatetime: sessionObj.datetime,
                sessionVaccines: sessionObj.vaccines.join(", "),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('vaccine_responses').add(data);
                document.getElementById('successAlert').style.display = 'block';
                document.getElementById('vaccineForm').reset();
                setTimeout(() => document.getElementById('successAlert').style.display = 'none', 3000);
                loadActiveForm(); // โหลดใหม่เพื่ออัปเดตโควตา
            } catch (error) { alert("❌ เกิดข้อผิดพลาด"); } 
            finally { submitBtn.innerText = "💾 บันทึกการจอง"; submitBtn.disabled = false; }
        });

        // --- ฝั่งจัดการของ Admin ---
        function openAdminModal() {
            const pin = prompt("🔐 กรุณากรอกรหัสผ่าน Admin:");
            if (pin === ADMIN_PIN) {
                renderCampaignHistory();
                showMainAdminView();
                document.getElementById('adminModal').style.display = 'flex';
            } else if (pin !== null) { alert("❌ รหัสผ่านไม่ถูกต้อง"); }
        }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
        function showMainAdminView() {
            document.getElementById('adminViewMain').style.display = 'block';
            document.getElementById('adminViewEdit').style.display = 'none';
        }

        // แสดงประวัติโครงการทั้งหมด
        function renderCampaignHistory() {
            const container = document.getElementById('campaignHistoryList');
            container.innerHTML = '';
            
            if(allCampaigns.length === 0) {
                container.innerHTML = '<p>ยังไม่มีประวัติโครงการ</p>'; return;
            }

            allCampaigns.forEach(camp => {
                const div = document.createElement('div');
                div.className = `campaign-item ${camp.isActive ? 'active' : ''}`;
                
                let statusBadge = camp.isActive ? '<strong style="color:green;">[เปิดใช้งานอยู่บนหน้าเว็บ]</strong>' : '<span style="color:#666;">[ปิดแล้ว]</span>';
                
                div.innerHTML = `
                    <div style="font-weight:bold; font-size:18px;">${camp.name} ${statusBadge}</div>
                    <div style="font-size:14px; color:#555; margin-bottom:10px;">รอบการฉีด: ${camp.sessions.length} รอบ</div>
                    
                    ${!camp.isActive ? `<button class="btn-small" style="background:#a8e6cf; border:2px solid #000;" onclick="setActiveCampaign('${camp.id}')">🟢 นำโครงการนี้ขึ้นหน้าเว็บ</button>` : ''}
                    <button class="btn-small btn-export" onclick="exportCampaignData('${camp.id}', '${camp.name}')">📊 ดึงข้อมูล Excel</button>
                    <button class="btn-small" style="background:#ddd; border:2px solid #000;" onclick="editCampaign('${camp.id}')">✏️ แก้ไขโครงสร้าง</button>
                `;
                container.appendChild(div);
            });
        }

        // ตั้งค่าให้โครงการนี้แสดงบนหน้าเว็บ
        async function setActiveCampaign(targetId) {
            allCampaigns.forEach(c => c.isActive = (c.id === targetId));
            await db.collection('app_settings').doc('vaccine_campaigns').set({ campaigns: allCampaigns });
            alert('✅ เปลี่ยนโครงการที่แสดงบนหน้าเว็บแล้ว');
            renderCampaignHistory();
            loadActiveForm(); // รีเฟรชหน้าผู้ใช้ด้านหลัง
        }

        // --- ส่วนของการสร้าง/แก้ไขโครงการ ---
        function showCreateCampaignView() {
            document.getElementById('editViewTitle').innerText = "✨ สร้างโครงการใหม่";
            document.getElementById('editCampId').value = "camp_" + Date.now();
            document.getElementById('editCampName').value = "";
            document.getElementById('editCampDeadline').value = "";
            document.getElementById('adminSessionsList').innerHTML = "";
            addNewAdminSessionRow(); // เพิ่มแถวว่าง 1 แถว
            
            document.getElementById('adminViewMain').style.display = 'none';
            document.getElementById('adminViewEdit').style.display = 'block';
        }

        function editCampaign(campId) {
            const camp = allCampaigns.find(c => c.id === campId);
            document.getElementById('editViewTitle').innerText = "✏️ แก้ไขโครงการ";
            document.getElementById('editCampId').value = camp.id;
            document.getElementById('editCampName').value = camp.name;
            document.getElementById('editCampDeadline').value = camp.deadline || "";
            
            const container = document.getElementById('adminSessionsList');
            container.innerHTML = "";
            camp.sessions.forEach(s => {
                addSessionRowToDOM(s.id, s.datetime, s.quota, s.vaccines);
            });

            document.getElementById('adminViewMain').style.display = 'none';
            document.getElementById('adminViewEdit').style.display = 'block';
        }

        function addNewAdminSessionRow() {
            addSessionRowToDOM('ses_' + Math.random().toString(36).substr(2, 6), '', '', []);
        }

        function addSessionRowToDOM(id, datetime, quota, selectedVaccines) {
            const container = document.getElementById('adminSessionsList');
            const row = document.createElement('div');
            row.className = 'admin-session-row';
            
            let checkboxesHtml = MASTER_VACCINES.map(v => {
                const isChecked = selectedVaccines.includes(v) ? 'checked' : '';
                return `<label><input type="checkbox" class="adm-vac-cb" value="${v}" ${isChecked}> ${v}</label>`;
            }).join('');

            row.innerHTML = `
                <input type="hidden" class="adm-id" value="${id}">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" class="adm-dt" style="flex:2;" placeholder="วัน/เวลา (เช่น 28 ก.พ. 09.00น.)" value="${datetime}">
                    <input type="number" class="adm-quota" style="flex:1;" placeholder="จำนวนรับ (คน)" value="${quota}">
                </div>
                <div class="vaccine-checkbox-list">
                    <strong>รายการวัคซีนประจำรอบ:</strong> ${checkboxesHtml}
                </div>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">🗑️ ลบรอบวันเวลานี้</button>
            `;
            container.appendChild(row);
        }

        async function saveCampaign() {
            const campId = document.getElementById('editCampId').value;
            const campName = document.getElementById('editCampName').value.trim();
            const deadline = document.getElementById('editCampDeadline').value;
            
            if(!campName) { alert("โปรดระบุชื่อโครงการ"); return; }

            let sessions = [];
            document.querySelectorAll('.admin-session-row').forEach(row => {
                const id = row.querySelector('.adm-id').value;
                const datetime = row.querySelector('.adm-dt').value.trim();
                const quota = parseInt(row.querySelector('.adm-quota').value);
                let vaccines = Array.from(row.querySelectorAll('.adm-vac-cb:checked')).map(cb => cb.value);
                
                if (datetime && !isNaN(quota)) {
                    sessions.push({ id, datetime, quota, vaccines });
                }
            });

            // ตรวจสอบว่าแก้ไขหรือสร้างใหม่
            let existingIndex = allCampaigns.findIndex(c => c.id === campId);
            let isActiveStatus = existingIndex >= 0 ? allCampaigns[existingIndex].isActive : false;
            
            // ถ้าสร้างใหม่และยังไม่มีโครงการไหนเลย ให้ Active อัตโนมัติ
            if (existingIndex < 0 && allCampaigns.length === 0) isActiveStatus = true;

            const newCampData = { id: campId, name: campName, deadline: deadline, isActive: isActiveStatus, sessions: sessions };

            if (existingIndex >= 0) { allCampaigns[existingIndex] = newCampData; } 
            else { allCampaigns.push(newCampData); }

            try {
                await db.collection('app_settings').doc('vaccine_campaigns').set({ campaigns: allCampaigns });
                alert("✅ บันทึกโครงการเรียบร้อย");
                renderCampaignHistory();
                showMainAdminView();
                loadActiveForm();
            } catch (error) { alert("❌ เกิดข้อผิดพลาดในการบันทึก"); }
        }

        // --- Export ดึงข้อมูลเฉพาะโครงการ ---
        async function exportCampaignData(targetCampaignId, campaignName) {
            try {
                const snapshot = await db.collection('vaccine_responses')
                                         .where('campaignId', '==', targetCampaignId)
                                         .orderBy('timestamp', 'desc').get();
                if (snapshot.empty) { alert('ไม่พบข้อมูลผู้ลงทะเบียนในโครงการนี้'); return; }

                const dataArray = [];
                snapshot.forEach(doc => {
                    const row = doc.data();
                    dataArray.push({
                        "โครงการ": row.campaignName,
                        "วันที่ทำรายการ": row.timestamp ? row.timestamp.toDate().toLocaleString('th-TH') : "",
                        "รหัสนักศึกษา": row.studentId, "ชื่อ-สกุล": row.fullName, "เบอร์โทรศัพท์": row.phone,
                        "รอบวัน/เวลาที่จอง": row.sessionDatetime, "วัคซีนที่เลือก": row.sessionVaccines
                    });
                });
                const worksheet = XLSX.utils.json_to_sheet(dataArray);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Data");
                XLSX.writeFile(workbook, `Export_${campaignName}.xlsx`);
            } catch (error) { 
                console.error(error);
                // แจ้งเตือนเรื่อง Index ใน Firebase
                alert("❌ เกิดข้อผิดพลาด กรุณาตรวจสอบ Console (F12) และคลิกลิงก์เพื่อสร้าง Index ของ Firebase ก่อนครับ"); 
            }
        }
    </script>

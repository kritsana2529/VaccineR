<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ศูนย์บริการสุขภาพ นศ. คณะพยาบาลศาสตร์</title>
    <style>
        /* Neo-Brutalism & Mobile-First Design */
        :root {
            --bg-color: #f4f4f5; 
            --apricot: #FFB347; /* สีประจำคณะ */
            --text-color: #1a1a1a; 
            --border-color: #1a1a1a;
        }
        * { box-sizing: border-box; font-family: 'Sarabun', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center;}
        
        .container { width: 100%; max-width: 500px; background: #ffffff; border: 3px solid var(--border-color); border-radius: 12px; box-shadow: 8px 8px 0px var(--border-color); padding: 30px 24px; text-align: center; }
        
        .logo-placeholder { font-size: 50px; margin-bottom: 10px; }
        h1 { font-size: 22px; margin-top: 0; margin-bottom: 5px; color: var(--text-color); }
        p.subtitle { font-size: 15px; color: #555; margin-bottom: 30px; font-weight: bold; }

        .menu-btn {
            display: flex; align-items: center; justify-content: center; width: 100%; padding: 18px; font-size: 18px; font-weight: bold; color: var(--text-color); text-decoration: none; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); transition: all 0.1s ease; margin-bottom: 15px;
        }
        
        .menu-btn:active { box-shadow: 0px 0px 0px var(--border-color); transform: translate(4px, 4px); }
        
        /* สีกำหนดตามประเภทผู้ใช้งาน */
        .btn-booking { background: #a8e6cf; }
        .btn-record { background: #ffccb6; }
        .btn-teacher { background: var(--apricot); margin-top: 30px; }
        
        .icon { font-size: 24px; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">🏥</div>
        <h1>ศูนย์บริการสุขภาพนักศึกษา</h1>
        <p class="subtitle">ระบบเตรียมความพร้อมก่อนขึ้นฝึกปฏิบัติ</p>

        <a href="booking.html" class="menu-btn btn-booking">
            <span class="icon">💉</span> จองคิวฉีดวัคซีน
        </a>

        <a href="student-record.html" class="menu-btn btn-record">
            <span class="icon">🩺</span> สมุดพกวัคซีนออนไลน์
        </a>

        <a href="teacher-dashboard.html" class="menu-btn btn-teacher">
            <span class="icon">👩‍🏫</span> กระดานตรวจสอบ (สำหรับอาจารย์)
        </a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Health Services - คณะพยาบาลศาสตร์</title>
    
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* 🎨 ธีม Neo-Brutalism + สีสัน (Apricot, Gold, Blue) */
        :root { 
            --bg-color: #f4f4f5; 
            --apricot: #FFB347; 
            --gold: #D4AF37; 
            --blue: #0056b3;
            --text-color: #1a1a1a; 
            --border-color: #1a1a1a; 
        }
        
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(#ccc 1px, transparent 0);
            background-size: 20px 20px; 
        }
        
        /* 🚀 หน้าต่างต้อนรับ (Welcome Screen) */
        #welcomeScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 4px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 12px 12px 0px var(--border-color);
            padding: 50px 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .welcome-badge {
            font-size: 50px;
            margin-bottom: 15px;
            background: var(--gold);
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--border-color);
            border-radius: 50%;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .title-eng {
            font-size: 38px;
            font-weight: 800;
            color: #fff;
            background: var(--blue);
            padding: 15px 30px;
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
            margin-bottom: 20px;
            line-height: 1.2;
            word-break: break-word;
        }

        .title-th {
            font-size: 22px;
            font-weight: 800;
            background: var(--apricot);
            padding: 10px 20px;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--border-color);
            margin-bottom: 40px;
        }

        /* 🟢 ปุ่มเข้าสู่ระบบ (เพิ่ม Animation) */
        .btn-enter {
            font-size: 22px;
            font-weight: 800;
            background: #a8e6cf;
            color: var(--text-color);
            padding: 16px 40px;
            border: 4px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--border-color);
            transition: all 0.1s ease;
            /* เรียกใช้ Animation */
            animation: bounce 1.5s infinite; 
        }

        .btn-enter:active {
            box-shadow: 0px 0px 0px var(--border-color);
            transform: translate(6px, 6px);
            /* หยุด Animation ชั่วคราวเวลากด */
            animation: none; 
        }

        /* 🎞️ Keyframes สำหรับแอนิเมชันปุ่มเด้ง */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-15px); /* เด้งขึ้น */
            }
            60% {
                transform: translateY(-7px);  /* เด้งลงมานิดหน่อยแล้วขึ้นอีก */
            }
        }

        /* 📌 หน้าเมนูหลัก (Main Menu) */
        #mainMenu {
            display: none; 
            width: 100%;
            max-width: 600px;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-header h2 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            background: var(--blue);
            display: inline-block;
            padding: 12px 25px;
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
            margin-bottom: 10px;
        }

        /* 📋 การ์ดเมนู */
        .menu-card {
            display: flex;
            align-items: center;
            background: #fff;
            border: 4px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 8px 8px 0px var(--border-color);
            padding: 20px;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.1s ease;
        }

        .menu-card:hover {
            background: #fffbf0;
            transform: translateY(-4px);
            box-shadow: 12px 12px 0px var(--border-color);
        }

        .menu-card:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .menu-icon {
            font-size: 40px;
            margin-right: 20px;
            background: var(--apricot);
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--border-color);
            flex-shrink: 0;
        }

        .menu-card:nth-child(3) .menu-icon {
            background: var(--gold); 
        }

        .menu-text {
            flex-grow: 1;
        }

        .menu-text h3 {
            margin: 0 0 5px 0;
            font-size: 22px;
            font-weight: 800;
        }

        .menu-text p {
            margin: 0;
            font-size: 15px;
            color: #444;
            font-weight: 600;
        }
        
        .arrow-icon {
            font-size: 28px;
            font-weight: 900;
        }

        /* 👩‍🏫 ปุ่มแอดมิน */
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            font-size: 16px;
            color: var(--text-color);
            background: #eee;
            text-decoration: none;
            font-weight: 800;
            padding: 15px 20px;
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
            transition: all 0.1s ease;
        }

        .admin-link:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-color);
        }
    </style>
</head>
<body>

    <!-- 🌟 1. หน้าต่างต้อนรับ (Welcome Screen) -->
    <div id="welcomeScreen">
        <div class="welcome-badge">🏥</div>
        <div class="title-eng">Student Health<br>Services</div>
        <div class="title-th">บริการสุขภาพนักศึกษา</div>
        
        <button class="btn-enter" onclick="enterSystem()">🚀 เข้าสู่ระบบ (Enter)</button>
    </div>

    <!-- 📌 2. หน้าเมนูหลัก (Main Menu) -->
    <div id="mainMenu">
        <div class="menu-header">
            <h2>🏥 Student Health Services</h2>
        </div>

        <!-- เมนูที่ 1: จองคิววัคซีน -->
        <a href="booking.html" class="menu-card">
            <div class="menu-icon">💉</div>
            <div class="menu-text">
                <h3>ระบบจองคิวฉีดวัคซีน</h3>
                <p>ลงทะเบียนเลือกวัน-เวลาเข้ารับบริการ</p>
            </div>
            <div class="arrow-icon">➔</div>
        </a>

        <!-- เมนูที่ 2: สมุดพกสุขภาพ -->
        <a href="student-record.html" class="menu-card">
            <div class="menu-icon">📑</div>
            <div class="menu-text">
                <h3>สมุดพกวัคซีนออนไลน์</h3>
                <p>บันทึกประวัติสุขภาพและอัปโหลดหลักฐาน</p>
            </div>
            <div class="arrow-icon">➔</div>
        </a>

        <!-- เมนูที่ 3: กระดานอาจารย์ -->
        <a href="teacher-dashboard.html" class="admin-link">
            👩‍🏫 สำหรับอาจารย์ / ผู้ดูแลระบบ (Admin)
        </a>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBsEXH7UzyDvOQbq7Q_cv_DufA4cDHktIM",
            authDomain: "vacciner-a3b0f.firebaseapp.com",
            projectId: "vacciner-a3b0f",
            storageBucket: "vacciner-a3b0f.firebasestorage.app",
            messagingSenderId: "322679198332",
            appId: "1:322679198332:web:01e4174c3f30845d576ff9"
        };
        firebase.initializeApp(firebaseConfig);

        // --- ระบบตรวจสอบการเข้าใช้งานหน้าแรก ---
        document.addEventListener("DOMContentLoaded", function() {
            if (sessionStorage.getItem('hasVisitedWelcome') === 'true') {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'block';
            }
        });

        // --- ฟังก์ชันเมื่อกดปุ่ม เข้าสู่ระบบ (Enter) ---
        function enterSystem() {
            sessionStorage.setItem('hasVisitedWelcome', 'true');
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }
    </script>
</body>
</html>

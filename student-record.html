<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สมุดพกวัคซีนออนไลน์ คณะพยาบาลศาสตร์</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f4f5; 
            --apricot: #FFB347; 
            --text-color: #1a1a1a; 
            --border-color: #1a1a1a;
        }
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 600px; background: #ffffff; border: 3px solid var(--border-color); border-radius: 12px; box-shadow: 6px 6px 0px var(--border-color); padding: 24px; margin-bottom: 24px; }
        
        h1, h2 { font-size: 20px; text-align: center; margin-top: 0; margin-bottom: 24px; background: var(--apricot); padding: 12px; border: 3px solid var(--border-color); border-radius: 8px; box-shadow: 4px 4px 0px var(--border-color); line-height: 1.5; }
        
        .btn-home { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #000; font-weight: bold; background: #eee; padding: 10px 15px; border: 3px solid #000; border-radius: 8px; margin-bottom: 20px; box-shadow: 2px 2px 0px #000; transition: all 0.1s; align-self: flex-start; }
        .btn-home:active { box-shadow: 0px 0px 0px #000; transform: translate(2px, 2px); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 12px; font-size: 16px; border: 3px solid var(--border-color); border-radius: 8px; background: #fff; transition: all 0.2s ease; }
        
        .disease-card { background: #fff; border: 3px solid var(--border-color); border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 4px 4px 0px var(--border-color); }
        .disease-title { font-size: 17px; font-weight: bold; color: #d35400; margin-bottom: 12px; border-bottom: 2px dashed #ccc; padding-bottom: 5px; }
        
        button.btn-save { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; color: var(--text-color); background: #a8e6cf; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); transition: all 0.1s ease; }
        button.btn-save:active { box-shadow: 0px 0px 0px; transform: translate(4px, 4px); }
        
        .current-file-link { display: inline-block; margin-top: 10px; font-size: 14px; color: #0066cc; text-decoration: none; font-weight: bold; background: #e6f2ff; padding: 5px 10px; border-radius: 4px; border: 1px solid #0066cc; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-home">🏠 กลับหน้าหลัก</a>

        <div id="loginSection">
            <h1>📑 บันทึกประวัติสุขภาพนักศึกษา</h1>
            <div class="form-group">
                <label>รหัสนักศึกษา</label>
                <input type="text" id="loginStudentId" placeholder="กรอกรหัสนักศึกษา">
                <button class="btn-save" style="background: var(--apricot); margin-top: 15px;" onclick="loginStudent()">🔍 ค้นหาข้อมูล</button>
            </div>
        </div>

        <div id="recordSection" style="display:none;">
            <h2 style="background:#a8e6cf;">👤 ข้อมูลนักศึกษา</h2>
            <div class="form-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="studentName" readonly style="background:#eee;">
            </div>

            <form id="vaccineRecordForm">
                <div class="disease-card">
                    <div class="disease-title">1. โรคสุกใส (Varicella)</div>
                    <select id="status_vzv">
                        <option value="ยังไม่ดำเนินการ">❌ ยังไม่ดำเนินการ</option>
                        <option value="มีหลักฐานเคยป่วยเป็นสุกใส">✅ มีหลักฐานว่าเคยป่วย</option>
                        <option value="ผลตรวจ Varicella IgG Positive">✅ ผลตรวจ IgG Positive</option>
                        <option value="รับวัคซีนสุกใสครบ 2 โด๊ส">✅ รับวัคซีนครบ 2 โด๊ส</option>
                    </select>
                    <div style="margin-top:10px;">
                        <label style="font-size:13px;">อัปโหลดหลักฐาน:</label>
                        <input type="file" id="file_vzv" accept="image/*">
                        <a id="link_vzv" class="current-file-link" target="_blank" style="display:none;">📄 ดูไฟล์ปัจจุบัน</a>
                    </div>
                </div>

                <div class="disease-card">
                    <div class="disease-title">2. ไวรัสตับอักเสบบี (Hepatitis B)</div>
                    <select id="status_hbv">
                        <option value="ยังไม่ดำเนินการ">❌ ยังไม่ดำเนินการ</option>
                        <option value="ผลตรวจ Anti-HBs IgG > 10 unit">✅ ผลตรวจ IgG > 10 unit</option>
                        <option value="รับวัคซีนตับอักเสบบีครบ 3 โด๊ส">✅ รับวัคซีนครบ 3 โด๊ส</option>
                    </select>
                    <div style="margin-top:10px;">
                        <label style="font-size:13px;">อัปโหลดหลักฐาน:</label>
                        <input type="file" id="file_hbv" accept="image/*">
                        <a id="link_hbv" class="current-file-link" target="_blank" style="display:none;">📄 ดูไฟล์ปัจจุบัน</a>
                    </div>
                </div>

                <button type="submit" class="btn-save" id="saveBtn">💾 บันทึกข้อมูลทั้งหมด</button>
                <p id="statusMsg" style="text-align:center; font-weight:bold; display:none; margin-top:15px;"></p>
            </form>
        </div>
    </div>

    <script>
        // ใส่ Firebase Config ของโปรเจกต์คุณที่นี่
        const firebaseConfig = {
            apiKey: "AIzaSyBsEXH7UzyDvOQbq7Q_cv_DufA4cDHktIM",
            authDomain: "vacciner-a3b0f.firebaseapp.com",
            projectId: "vacciner-a3b0f",
            storageBucket: "vacciner-a3b0f.firebasestorage.app",
            messagingSenderId: "322679198332",
            appId: "1:322679198332:web:01e4174c3f30845d576ff9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentId = "";

        async function loginStudent() {
            const sid = document.getElementById('loginStudentId').value.trim();
            if(!sid) return alert("กรุณาระบุรหัส");

            // ดึงข้อมูลจาก Master Data
            const masterDoc = await db.collection('students_master').doc(sid).get();
            if(!masterDoc.exists) return alert("ไม่พบข้อมูลนักศึกษาในระบบกรุณาติดต่อคณะ");

            const data = masterDoc.data();
            document.getElementById('studentName').value = data.fullName;
            currentId = sid;

            // ดึงข้อมูลสุขภาพเดิม (ถ้ามี)
            const recordDoc = await db.collection('student_health_records').doc(sid).get();
            if(recordDoc.exists) {
                const rec = recordDoc.data();
                ['vzv', 'hbv'].forEach(d => {
                    if(rec[`status_${d}`]) document.getElementById(`status_${d}`).value = rec[`status_${d}`];
                    if(rec[`fileUrl_${d}`]) {
                        const link = document.getElementById(`link_${d}`);
                        link.href = rec[`fileUrl_${d}`];
                        link.style.display = 'inline-block';
                    }
                });
            }

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('recordSection').style.display = 'block';
        }

        // ฟังก์ชันบีบอัดรูปภาพ
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 1000;
                        let width = img.width;
                        let height = img.height;

                        if (width > height && width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        } else if (height > maxWidth) {
                            width *= maxWidth / height;
                            height = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', 0.7);
                    };
                };
            });
        }

        document.getElementById('vaccineRecordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const msg = document.getElementById('statusMsg');
            btn.disabled = true;
            msg.innerText = "⏳ กำลังบีบอัดและอัปโหลดข้อมูล...";
            msg.style.display = 'block';

            const payload = {
                studentId: currentId,
                fullName: document.getElementById('studentName').value,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                for (const d of ['vzv', 'hbv']) {
                    payload[`status_${d}`] = document.getElementById(`status_${d}`).value;
                    const fileInput = document.getElementById(`file_${d}`);
                    if (fileInput.files.length > 0) {
                        const compressedFile = await compressImage(fileInput.files[0]);
                        const ref = storage.ref(`vaccine_proofs/${currentId}_${d}_${Date.now()}.jpg`);
                        await ref.put(compressedFile);
                        payload[`fileUrl_${d}`] = await ref.getDownloadURL();
                    }
                }
                await db.collection('student_health_records').doc(currentId).set(payload, { merge: true });
                alert("✅ บันทึกข้อมูลสำเร็จ");
                location.reload();
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาด");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
